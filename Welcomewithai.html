<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎2026年新年学习计划</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div id="msgBox" class="msg-box" style="display:none;"></div>
        <h1 class="welcome-title">🎉 欢迎2026年新年学习计划 🎉</h1>
        <div class="plan-actions">
            <button id="randomBtn" class="action-btn">随机抽取一个学习计划</button>
            <button id="addBtn" class="action-btn">添加新计划</button>
            <button id="highlightAllBtn" class="action-btn">全部高亮</button>
        </div>
        <div id="addPlanBox" style="display:none; margin:16px 0;">
            <input type="text" id="newPlanInput" placeholder="输入新计划..." style="padding:8px; font-size:1rem;">
            <button id="confirmAddBtn" class="action-btn">确认添加</button>
        </div>
        <ul class="plan-list">
            <li class="plan-item">掌握一门新编程语言</li>
            <li class="plan-item">每周阅读一本技术书籍</li>
            <li class="plan-item">完成一个AI项目实战</li>
            <li class="plan-item">坚持每日英语学习</li>
            <li class="plan-item">参与线上技术社区交流</li>
        </ul>
        <p class="wish">愿你在新的一年里不断成长，收获满满！</p>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
</html>
