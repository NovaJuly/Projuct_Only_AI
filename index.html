<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>简易电商平台</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">我的商店</h1>
      <div class="cart" id="cartToggle">🛒 <span id="cartCount">0</span></div>
    </div>
  </header>

  <main class="container">
    <section id="products" class="products-grid"></section>
  </main>

  <aside id="cartDrawer" class="cart-drawer hidden">
    <h2>购物车</h2>
    <ul id="cartItems" class="cart-items"></ul>
    <div class="cart-summary">
      <div>合计: ¥<span id="cartTotal">0.00</span></div>
      <button id="checkoutBtn" class="btn">去结算</button>
    </div>
    <button id="closeCart" class="close">关闭</button>
  </aside>

  <script src="js/app.js"></script>
</body>
</html>
